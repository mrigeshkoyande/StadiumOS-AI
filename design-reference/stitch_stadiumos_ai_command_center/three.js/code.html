<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  /**
 * StadiumOS AI Cinematic Intro Animation
 * Technique: Tier 4 Three.js
 * Visuals: A football moves across a clean white scene, followed by a premium
 * abstract trophy-like geometric form that divides and reveals the intelligence layer.
 */

let scene, camera, renderer, clock;
let football, trophyLeft, trophyRight, coreGlow;
let animationComplete = false;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const width = container.clientWidth || window.innerWidth;
    const height = container.clientHeight || window.innerHeight;

    camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.z = 10;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // Football
    const footballGeom = new THREE.SphereGeometry(0.5, 32, 32);
    const footballMat = new THREE.MeshPhongMaterial({ 
        color: 0xffffff, 
        specular: 0x111111, 
        shininess: 30,
        flatShading: true 
    });
    football = new THREE.Mesh(footballGeom, footballMat);
    football.position.x = -12;
    scene.add(football);

    // Trophy Parts (Abstract Geometric)
    const trophyGeom = new THREE.CylinderGeometry(0.5, 1.5, 4, 32);
    const trophyMat = new THREE.MeshPhongMaterial({ 
        color: 0xC7A44A, // Premium Gold
        metalness: 0.8,
        roughness: 0.2
    });

    trophyLeft = new THREE.Mesh(trophyGeom, trophyMat);
    trophyRight = new THREE.Mesh(trophyGeom, trophyMat);
    
    trophyLeft.position.y = -10; // Hide initially
    trophyRight.position.y = -10;
    
    scene.add(trophyLeft);
    scene.add(trophyRight);

    // Core Glow (Intelligence Layer)
    const coreGeom = new THREE.SphereGeometry(0.8, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x1455D9, transparent: true, opacity: 0 });
    coreGlow = new THREE.Mesh(coreGeom, coreMat);
    scene.add(coreGlow);

    window.addEventListener('resize', onWindowResize);
    animate();
}

function onWindowResize() {
    const width = container.clientWidth || window.innerWidth;
    const height = container.clientHeight || window.innerHeight;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
}

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    if (time < 2) {
        // Football movement
        football.position.x = -12 + (time * 12);
        football.rotation.z -= 0.1;
    } else if (time < 4) {
        // Trophy emergence
        football.visible = false;
        const t = (time - 2) / 2;
        trophyLeft.position.y = -4 + (t * 4);
        trophyRight.position.y = -4 + (t * 4);
    } else if (time < 6) {
        // Trophy splitting
        const t = (time - 4) / 2;
        trophyLeft.position.x = -t * 2;
        trophyRight.position.x = t * 2;
        coreGlow.material.opacity = t;
    } else if (!animationComplete) {
        animationComplete = true;
        // Signal parent to transition
        const event = new CustomEvent('introComplete');
        window.dispatchEvent(event);
    }

    renderer.render(scene, camera);
}

init();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->
</body>
</html>
